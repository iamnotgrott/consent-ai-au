<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Consent OS</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f172a;
        --fg: #e2e8f0;
        --muted: #94a3b8;
        --line: #334155;
        --teal: #2dd4bf;
      }
      * {
        box-sizing: border-box;
      }
      body {
        width: 360px;
        min-height: 200px;
        margin: 0;
        font:
          13px/1.4 system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
        padding: 12px;
      }
      h1 {
        font-size: 14px;
        font-weight: 600;
        margin: 0 0 8px;
        color: var(--teal);
      }
      p,
      li {
        font-size: 12px;
        color: var(--muted);
      }
      .err {
        color: #f87171;
        font-size: 12px;
        margin-bottom: 8px;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        max-height: 320px;
        overflow: auto;
      }
      li {
        border-bottom: 1px solid var(--line);
        padding: 8px 0;
      }
      .kind {
        color: var(--teal);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .meta {
        font-size: 11px;
        margin-top: 4px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h1>Consent OS — live detections</h1>
    <p class="err" id="err" hidden></p>
    <p id="empty">Loading…</p>
    <ul id="list" hidden></ul>
    <script src="popup.js"></script>
  </body>
</html>
